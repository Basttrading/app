<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
    <link rel="shortcut icon" href="assets/favicon.png?v=2">
    <title>Inscription Admin | Bast Trading</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card { max-width: 400px; margin: 100px auto; padding: 40px; background: #11141b; border-radius: 16px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 20px; }
        .btn-admin { background: var(--primary-color); color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; }
    </style>
</head>
<body style="background: #080a0f; color: white; font-family: sans-serif;">
    <div class="auth-card">
        <h2 style="margin-bottom: 24px; text-align: center; color: var(--primary-color);">Créer un compte COACH</h2>
        <form id="signup-form">
            <div class="form-group">
                <label class="form-label">Email Professionnel</label>
                <input type="email" id="email" class="form-input" required placeholder="admin@bast-trading.com">
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-input" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Prénom</label>
                <input type="text" id="prenom" class="form-input" required placeholder="Votre prénom">
            </div>
            <button type="submit" class="btn-admin">CRÉER MON ACCÈS COACH</button>
        </form>
        <p id="msg" style="margin-top: 20px; text-align: center; font-size: 14px;"></p>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';
        
        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const prenom = document.getElementById('prenom').value;
            const msg = document.getElementById('msg');

            msg.innerText = "Création en cours...";

            // 1. Sign Up dans Auth
            const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
            
            if (authError) {
                msg.innerText = "Erreur Auth: " + authError.message;
                return;
            }

            const user = authData.user;

            // 2. Création forcée du profil ADMIN
            const { error: profError } = await supabase.from('profiles').upsert({
                id: user.id,
                email: email,
                prenom: prenom,
                role: 'admin'
            });

            if (profError) {
                msg.innerText = "Erreur Profil: " + profError.message + " (Mais le compte Auth est créé. Allez sur Supabase pour changer le rôle en admin manuellement si besoin)";
            } else {
                msg.style.color = "var(--primary-color)";
                msg.innerText = "Compte Coach créé ! Redirection...";
                setTimeout(() => window.location.href = 'admin.html', 2000);
            }
        };
    </script>
</body>
</html>
