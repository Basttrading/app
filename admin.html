<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
    <link rel="shortcut icon" href="assets/favicon.png?v=2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Portal | Bast Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <link rel="stylesheet" href="css/admin.css?v=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body class="admin-body">

    <div class="app-container">
        <!-- Sidebar Coach -->
        <aside class="sidebar admin-sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-crown"></i> Portail Bast
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" data-view="dashboard">
                    <i class="fa-solid fa-chart-line"></i> Dashboard Global
                </a>
                <a href="#" class="nav-link" data-view="students">
                    <i class="fa-solid fa-users"></i> Mes Élèves
                </a>
                <a href="#" class="nav-link" data-view="content">
                    <i class="fa-solid fa-clapperboard"></i> Gestion Formation
                </a>
            </nav>
            <div class="sidebar-footer">
                <div id="coach-info" style="margin-bottom: 15px; padding: 0 16px;">
                    <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Connecté en tant que</div>
                    <div id="coach-name" style="font-size: 14px; font-weight: 700; color: var(--primary-color);">Bastien</div>
                </div>
                <a href="#" class="nav-link" data-view="profile" style="margin-bottom: 10px;">
                    <i class="fa-solid fa-user-gear"></i> Mon Profil
                </a>
                <button id="btn-logout" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content Area (Dynamic) -->
        <main class="main-wrapper">
            <div id="admin-content-area">
                <div style="display: flex; justify-content: center; align-items: center; height: 80vh;">
                    <div class="loader-admin"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals and Overlays -->
    <div id="modal-container"></div>
    <div id="toast-container"></div>

    <script type="module" src="js/admin/main.js?v=2.4"></script>
</body>
</html>
