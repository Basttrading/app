<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/favicon.png?v=2">
    <link rel="shortcut icon" href="assets/favicon.png?v=2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Trades | Bast Trading Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .badge-plan { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,0.05); }
        .plan-ok { color: var(--success-color); }
        .plan-ko { color: var(--error-color); }
        .btn-action { background: #1a1e26; border: 1px solid var(--border-color); color: var(--text-muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { border-color: var(--primary-color); color: var(--text-main); }
        .btn-delete:hover { border-color: var(--error-color); color: var(--error-color); }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-chart-line"></i> Bast Trading
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="mes-trades.html" class="nav-link active">
                    <i class="fa-solid fa-clock-rotate-left"></i> Mes Trades
                </a>
                <a href="analyse.html" class="nav-link">
                    <i class="fa-solid fa-chart-pie"></i> Analyse
                </a>
                
                <div style="height: 40px;"></div>

                <a href="formation.html" class="nav-link">
                    <i class="fa-solid fa-graduation-cap"></i> Formation
                </a>
                
                <div class="sidebar-progress" id="sidebar-progress-container" style="padding: 0 16px; margin-top: -5px;">
                    <div style="display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">
                        <span id="sidebar-progress-percent">0%</span>
                        <span id="sidebar-progress-count">0/0</span>
                    </div>
                    <div style="height: 6px; background: #111418; border-radius: 3px; overflow: hidden;">
                        <div id="sidebar-progress-bar" style="height: 100%; width: 0%; background: var(--primary-color); transition: width 0.3s ease;"></div>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-link" style="margin-bottom: 10px;">
                    <i class="fa-solid fa-user-gear"></i> Profil
                </a>
                <button id="btn-logout" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header style="margin-bottom: 50px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h1 style="font-size: 32px; margin-bottom: 8px;">Mes Trades</h1>
                    <p id="load-status" style="color: var(--text-muted); font-size: 16px; font-weight: 500;">Chargement de vos données...</p>
                </div>
                <a href="new-trade.html" class="btn btn-primary btn-new-trade"><i class="fa-solid fa-plus"></i> Nouveau Trade</a>
            </header>

            <div id="alert-msg" class="alert"></div>

            <section class="card" style="margin-bottom: 30px;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Rechercher Actif</label>
                        <input type="text" id="search-symbol" class="form-input" placeholder="ex: BTC">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Statut</label>
                        <select id="filter-status" class="form-input">
                            <option value="all">Tous les résultats</option>
                            <option value="Win">Gagnant (TP)</option>
                            <option value="Loss">Perdant (SL)</option>
                            <option value="BE">Break Even (BE)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Compte</label>
                        <select id="filter-account" class="form-input">
                            <option value="all">Tous les comptes</option>
                            <option value="Demo">Backtesting</option>
                            <option value="Funded">Propfirm</option>
                            <option value="Demo">Paper</option>
                            <option value="Personal">Compte Propre</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="card" style="padding: 10px;">
                <div class="table-container">
                    <table id="history-table" style="display: none;">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Actif</th>
                                <th>Sens</th>
                                <th>RR</th>
                                <th>Résultat</th>
                                <th>Plan</th>
                                <th>Qualité</th>
                                <th style="text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>

                <div id="empty-state" style="display: none; text-align: center; padding: 60px;">
                    <i class="fa-solid fa-box-open" style="font-size: 48px; color: var(--border-color); margin-bottom: 20px;"></i>
                    <h3>Aucun trade trouvé</h3>
                    <p style="color: var(--text-muted);">Essayez de modifier vos filtres ou ajoutez un nouveau trade.</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/mes-trades.js?v=1.1"></script>
</body>
</html>
